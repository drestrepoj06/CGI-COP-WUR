<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Leaflet Animated Route</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    html, body, #map { height: 100%; margin: 0; padding: 0; }
  </style>
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
</head>
<body>
<div id="map"></div>
<script>
  // Route will be injected here
  //__INSERT_COORDS_HERE__

  const map = L.map('map').setView(route[0], 13);

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: 'Map data © OpenStreetMap contributors'
  }).addTo(map);

  const polyline = L.polyline(route, {color: 'blue'}).addTo(map);
  map.fitBounds(polyline.getBounds());

  const marker = L.circleMarker(route[0], {
    radius: 10,
    color: 'orange',
    fillColor: 'orange',
    fillOpacity: 0.8
  }).addTo(map);

  let i = 0;
  function animateMarker() {
    if (i < route.length) {
      marker.setLatLng(route[i]);
      i++;
      requestAnimationFrame(animateMarker);
    }
  }

  animateMarker();
</script>
</body>
</html>
